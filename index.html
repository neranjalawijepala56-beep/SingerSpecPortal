<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Singer Refrigerator – Wiring Diagram Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --singer-red:  #E30613;
      --singer-dark: #1A0305;
      --singer-mid:  #3D0609;
      --white:       #FFFFFF;
      --off-white:   #F8F5F5;
      --card-bg:     #FFFFFF;
      --border:      #E8E0E0;
      --text-main:   #1C1C1E;
      --text-sub:    #6C6C70;
      --text-label:  #8A8A8E;
      --shadow-sm:   0 1px 4px rgba(0,0,0,0.08);
      --shadow-md:   0 4px 20px rgba(0,0,0,0.10);
      --shadow-lg:   0 12px 40px rgba(0,0,0,0.18);
      --red-glow:    0 0 0 3px rgba(227,6,19,0.18);
      --radius:      14px;
      --radius-sm:   8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--text-main); min-height: 100vh; }

    /* HEADER */
    header {
      background: linear-gradient(135deg, var(--singer-dark) 0%, var(--singer-mid) 60%, #6B0A0F 100%);
      color: #fff;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.35);
    }
    .header-brand { display: flex; align-items: center; gap: 14px; }
    .header-logo {
      background: var(--singer-red);
      border-radius: 10px;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px; font-weight: 700;
      color: white;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
    }
    .header-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 0.5px; }
    .header-subtitle { font-size: 11.5px; color: rgba(255,255,255,0.5); margin-top: 1px; letter-spacing: 0.8px; text-transform: uppercase; }
    .header-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 6px 14px;
      font-size: 12px; color: rgba(255,255,255,0.7);
    }

    /* SELECTOR BAR */
    .selector-bar {
      background: linear-gradient(180deg, #2A0406 0%, #1A0305 100%);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .selector-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: 1.2px;
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── DROPDOWN COMPONENT ── */
    .dropdown-wrap {
      position: relative;
      flex: 1; max-width: 460px; min-width: 220px;
    }

    /* The clickable trigger (looks like a select) */
    .dropdown-trigger {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-sm);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 44px 10px 42px;
      outline: none;
      cursor: pointer;
      display: flex; align-items: center;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      user-select: none;
    }
    .dropdown-trigger:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.25); }
    .dropdown-trigger.open  { border-color: var(--singer-red); background: rgba(255,255,255,0.09); box-shadow: var(--red-glow); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
    .trigger-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.4); pointer-events: none; display: flex;
    }
    .trigger-arrow {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.45); pointer-events: none; display: flex;
      transition: transform 0.22s ease;
    }
    .trigger-arrow.up { transform: translateY(-50%) rotate(180deg); }
    .trigger-placeholder { color: rgba(255,255,255,0.38); }
    .trigger-selected    { color: white; font-weight: 500; }

    /* The dropdown panel */
    .dropdown-panel {
      display: none;
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: #1C0204;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-top: none;
      border-bottom-left-radius: var(--radius-sm);
      border-bottom-right-radius: var(--radius-sm);
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
      z-index: 300;
      overflow: hidden;
    }
    .dropdown-panel.open { display: block; }

    /* Inline search box inside panel */
    .panel-search-wrap {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }
    .panel-search {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 7px 12px 7px 34px;
      outline: none;
      transition: border-color 0.2s;
    }
    .panel-search:focus { border-color: var(--singer-red); }
    .panel-search::placeholder { color: rgba(255,255,255,0.3); }
    .panel-search-icon {
      position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.35); pointer-events: none; display: flex;
    }

    /* Options list */
    .dropdown-options { max-height: 220px; overflow-y: auto; }
    .dropdown-options::-webkit-scrollbar { width: 4px; }
    .dropdown-options::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .dropdown-option {
      padding: 12px 16px;
      font-size: 14px; color: rgba(255,255,255,0.8);
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.12s;
    }
    .dropdown-option:last-child { border-bottom: none; }
    .dropdown-option:hover       { background: rgba(227,6,19,0.18); color: white; }
    .dropdown-option.is-selected { background: rgba(227,6,19,0.25); color: white; }
    .option-check { margin-left: auto; flex-shrink: 0; color: #FF8080; opacity: 0; }
    .dropdown-option.is-selected .option-check { opacity: 1; }
    .option-tag {
      background: rgba(227,6,19,0.25); color: #FF8080;
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 4px;
      letter-spacing: 0.5px; text-transform: uppercase;
      flex-shrink: 0;
    }
    .no-results { padding: 16px; color: rgba(255,255,255,0.35); font-size: 13px; text-align: center; }

    /* Selected chip */
    .selected-chip {
      display: none;
      align-items: center; gap: 8px;
      background: rgba(227,6,19,0.15);
      border: 1px solid rgba(227,6,19,0.4);
      border-radius: 20px;
      padding: 7px 14px;
      color: #FF8080;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .selected-chip.visible { display: flex; }

    /* MAIN LAYOUT */
    .main-content {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px; padding: 28px 32px;
      max-width: 1400px; margin: 0 auto;
    }

    /* DIAGRAM PANEL */
    .diagram-panel {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
      background: #FDFAFA;
    }
    .panel-title {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px; font-weight: 700; letter-spacing: 0.4px;
    }
    .panel-title .icon-box {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--singer-red), #B00010);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white;
    }
    .zoom-controls { display: flex; align-items: center; gap: 6px; }
    .zoom-btn {
      width: 30px; height: 30px;
      border: 1px solid var(--border); background: white;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-sub);
      transition: all 0.15s;
    }
    .zoom-btn:hover { background: var(--singer-red); color: white; border-color: var(--singer-red); }
    .zoom-level { font-size: 12px; color: var(--text-label); min-width: 36px; text-align: center; }

    .diagram-container {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(227,6,19,0.03) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(0,0,0,0.025) 28px, rgba(0,0,0,0.025) 29px),
        repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(0,0,0,0.025) 28px, rgba(0,0,0,0.025) 29px);
      min-height: 480px; overflow: hidden; cursor: grab; position: relative;
    }
    .diagram-container:active { cursor: grabbing; }

    .diagram-img {
      max-width: 100%; max-height: 520px;
      object-fit: contain; display: block;
      transition: transform 0.25s ease, opacity 0.3s;
      transform-origin: center center;
      user-select: none;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.12));
    }
    .diagram-img.fade-out { opacity: 0; transform: scale(0.97); }
    .diagram-img.fade-in  { opacity: 1; transform: scale(1); }

    .placeholder-state {
      display: flex; flex-direction: column; align-items: center; gap: 14px; color: var(--text-label);
    }
    .placeholder-state .ph-icon {
      width: 64px; height: 64px;
      border: 2px dashed var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .placeholder-state p { font-size: 14px; text-align: center; line-height: 1.6; }

    .diagram-footer {
      padding: 12px 22px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-label);
      background: #FDFAFA;
    }

    /* SPECS */
    .specs-panel { display: flex; flex-direction: column; gap: 16px; }

    .model-card {
      background: linear-gradient(135deg, var(--singer-dark) 0%, #4A0A10 100%);
      border-radius: var(--radius); padding: 22px;
      color: white; position: relative; overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .model-card::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 130px; height: 130px; border-radius: 50%;
      background: rgba(227,6,19,0.15); pointer-events: none;
    }
    .model-card-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.45); margin-bottom: 8px; }
    .model-card-name { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .model-card-series { font-size: 13px; color: rgba(255,255,255,0.55); display: flex; align-items: center; gap: 6px; }
    .model-card-series span { background: rgba(255,255,255,0.08); padding: 2px 9px; border-radius: 10px; }

    .spec-section-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-label);
      display: flex; align-items: center; gap: 8px; padding: 0 2px;
    }
    .spec-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .spec-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px 15px;
      display: flex; flex-direction: column; gap: 8px;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .spec-card:hover { border-color: rgba(227,6,19,0.3); box-shadow: 0 4px 16px rgba(227,6,19,0.08); transform: translateY(-1px); }
    .spec-card.highlight { background: linear-gradient(135deg, #FFF5F5, #FFF0F0); border-color: rgba(227,6,19,0.2); }
    .spec-card.highlight .spec-value { color: var(--singer-red); }
    .spec-card-top { display: flex; align-items: center; gap: 7px; color: var(--singer-red); }
    .spec-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-label); font-weight: 500; }
    .spec-value { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--text-main); line-height: 1; }
    .spec-unit  { font-size: 12px; color: var(--text-sub); font-family: 'DM Sans', sans-serif; }

    .empty-state {
      text-align: center; padding: 40px 20px;
      color: var(--text-label);
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
    }
    .empty-state p { font-size: 14px; margin-top: 10px; }

    @keyframes slideUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .animate-in { animation: slideUp 0.35s ease forwards; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--singer-dark); color: white;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.3s ease; z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* RESPONSIVE */
    @media (max-width: 960px) {
      .main-content { grid-template-columns: 1fr; padding: 20px; }
      .specs-panel { order: -1; }
    }
    @media (max-width: 600px) {
      header { padding: 0 16px; height: 60px; }
      .header-badge { display: none; }
      .selector-bar { padding: 14px 16px; }
      .main-content { padding: 14px; gap: 14px; }
      .diagram-container { padding: 16px; min-height: 300px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-brand">
    <div class="header-logo">S</div>
    <div>
      <div class="header-title">Singer Refrigerators</div>
      <div class="header-subtitle">Wiring Diagram Reference System</div>
    </div>
  </div>
  <div class="header-badge">
    <i data-lucide="zap" style="width:13px;height:13px;"></i>
    Technical Service Portal
  </div>
</header>

<!-- SELECTOR BAR -->
<div class="selector-bar">
  <div class="selector-label">
    <i data-lucide="layers" style="width:13px;height:13px;"></i>
    Model
  </div>

  <!-- DROPDOWN -->
  <div class="dropdown-wrap" id="dropdownWrap">

    <!-- Trigger button -->
    <div class="dropdown-trigger" id="dropdownTrigger" role="combobox" aria-haspopup="listbox" aria-expanded="false" tabindex="0">
      <span class="trigger-icon"><i data-lucide="refrigerator" style="width:16px;height:16px;"></i></span>
      <span id="triggerText" class="trigger-placeholder">Select a model…</span>
      <span class="trigger-arrow" id="triggerArrow"><i data-lucide="chevron-down" style="width:16px;height:16px;"></i></span>
    </div>

    <!-- Panel (search + options) -->
    <div class="dropdown-panel" id="dropdownPanel" role="listbox">
      <div class="panel-search-wrap">
        <span class="panel-search-icon"><i data-lucide="search" style="width:14px;height:14px;"></i></span>
        <input
          class="panel-search"
          id="panelSearch"
          type="text"
          placeholder="Type to search model…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div class="dropdown-options" id="dropdownOptions"></div>
    </div>
  </div>

  <!-- Chip showing selected -->
  <div class="selected-chip" id="selectedChip">
    <i data-lucide="check-circle-2" style="width:14px;height:14px;"></i>
    <span id="selectedChipText"></span>
  </div>
</div>

<!-- MAIN -->
<div class="main-content">

  <!-- LEFT: DIAGRAM -->
  <div class="diagram-panel">
    <div class="panel-header">
      <div class="panel-title">
        <div class="icon-box">
          <i data-lucide="git-branch" style="width:15px;height:15px;"></i>
        </div>
        Wiring Diagram
        <span id="diagramModelLabel" style="font-weight:400;font-size:13px;color:var(--text-sub);margin-left:4px;"></span>
      </div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomOut"><i data-lucide="minus" style="width:14px;height:14px;"></i></button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button class="zoom-btn" id="zoomIn"><i data-lucide="plus" style="width:14px;height:14px;"></i></button>
        <button class="zoom-btn" id="zoomReset" style="margin-left:4px;"><i data-lucide="maximize-2" style="width:14px;height:14px;"></i></button>
      </div>
    </div>

    <div class="diagram-container" id="diagramContainer">
      <div class="placeholder-state" id="placeholderState">
        <div class="ph-icon"><i data-lucide="cpu" style="width:28px;height:28px;color:#ccc;"></i></div>
        <p>Select a model above<br>to view its wiring diagram</p>
      </div>
      <img class="diagram-img" id="diagramImg" src="" alt="Wiring Diagram" style="display:none;" draggable="false"/>
    </div>

    <div class="diagram-footer">
      <i data-lucide="info" style="width:13px;height:13px;color:var(--singer-red);"></i>
      Use +/− buttons to zoom · Scroll wheel to zoom · Drag to pan
    </div>
  </div>

  <!-- RIGHT: SPECS -->
  <div class="specs-panel" id="specsPanel">
    <div class="empty-state" id="emptySpec">
      <i data-lucide="layers" style="width:32px;height:32px;color:#ccc;"></i>
      <p>Model specifications<br>will appear here</p>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i data-lucide="check" style="width:14px;height:14px;color:#4CAF50;"></i>
  <span id="toastMsg">Model loaded</span>
</div>

<script>
  // ── DATA ──────────────────────────────────────────────────
  const MODELS = [
    {
      id: 'ECO_185SD', label: 'ECO 185SD', series: 'ECO Series', image: 'ECO 185SD.png',
      specs: {
        volume:      { value:'185',     unit:'Litres', label:'Net Volume',    icon:'box'      },
        grossVolume: { value:'192',     unit:'Litres', label:'Gross Volume',  icon:'package'  },
        voltage:     { value:'220–240', unit:'V~',     label:'Rated Voltage', icon:'zap'      },
        frequency:   { value:'50',      unit:'Hz',     label:'Frequency',     icon:'activity' },
        current:     { value:'0.85',    unit:'A',      label:'Rated Current', icon:'gauge'    },
        motorInput:  { value:'100',     unit:'W',      label:'Motor Input',   icon:'cpu'      },
        refrigerant: { value:'R600a',   unit:'28 g',   label:'Refrigerant',   icon:'droplets' },
        netWeight:   { value:'43',      unit:'kg',     label:'Net Weight',    icon:'scale'    },
      }
    },
    {
      id: 'GEO_150SD_SV', label: 'GEO 150SD-SV', series: 'GEO Series', image: 'GEO 150SD SV.png',
      specs: {
        volume:      { value:'150',     unit:'Litres', label:'Net Volume',    icon:'box'      },
        grossVolume: { value:'157',     unit:'Litres', label:'Gross Volume',  icon:'package'  },
        voltage:     { value:'220–240', unit:'V~',     label:'Rated Voltage', icon:'zap'      },
        frequency:   { value:'50',      unit:'Hz',     label:'Frequency',     icon:'activity' },
        current:     { value:'0.75',    unit:'A',      label:'Rated Current', icon:'gauge'    },
        motorInput:  { value:'85',      unit:'W',      label:'Motor Input',   icon:'cpu'      },
        refrigerant: { value:'R600a',   unit:'24 g',   label:'Refrigerant',   icon:'droplets' },
        netWeight:   { value:'36',      unit:'kg',     label:'Net Weight',    icon:'scale'    },
      }
    },
    {
      id: 'GEO_185SD', label: 'GEO 185SD', series: 'GEO Series', image: 'GEO 185SD.png',
      specs: {
        volume:      { value:'185',     unit:'Litres', label:'Net Volume',    icon:'box'      },
        grossVolume: { value:'192',     unit:'Litres', label:'Gross Volume',  icon:'package'  },
        voltage:     { value:'220–240', unit:'V~',     label:'Rated Voltage', icon:'zap'      },
        frequency:   { value:'50',      unit:'Hz',     label:'Frequency',     icon:'activity' },
        current:     { value:'0.85',    unit:'A',      label:'Rated Current', icon:'gauge'    },
        motorInput:  { value:'100',     unit:'W',      label:'Motor Input',   icon:'cpu'      },
        refrigerant: { value:'R600a',   unit:'28 g',   label:'Refrigerant',   icon:'droplets' },
        netWeight:   { value:'42',      unit:'kg',     label:'Net Weight',    icon:'scale'    },
      }
    }
  ];

  // ── REFS ──────────────────────────────────────────────────
  const trigger       = document.getElementById('dropdownTrigger');
  const panel         = document.getElementById('dropdownPanel');
  const panelSearch   = document.getElementById('panelSearch');
  const optionsEl     = document.getElementById('dropdownOptions');
  const triggerText   = document.getElementById('triggerText');
  const triggerArrow  = document.getElementById('triggerArrow');
  const selectedChip  = document.getElementById('selectedChip');
  const selectedChipT = document.getElementById('selectedChipText');
  const diagramImg    = document.getElementById('diagramImg');
  const placeholder   = document.getElementById('placeholderState');
  const specsPanel    = document.getElementById('specsPanel');
  const zoomLevelEl   = document.getElementById('zoomLevel');
  const toast         = document.getElementById('toast');
  const toastMsg      = document.getElementById('toastMsg');
  const diagramLabel  = document.getElementById('diagramModelLabel');

  let currentModel = null;
  let currentZoom  = 1;
  let isOpen       = false;

  // ── DROPDOWN OPEN/CLOSE ───────────────────────────────────
  function openDropdown() {
    isOpen = true;
    panel.classList.add('open');
    trigger.classList.add('open');
    trigger.setAttribute('aria-expanded', 'true');
    triggerArrow.classList.add('up');
    renderOptions(MODELS);
    setTimeout(() => panelSearch.focus(), 50);
  }

  function closeDropdown() {
    isOpen = false;
    panel.classList.remove('open');
    trigger.classList.remove('open');
    trigger.setAttribute('aria-expanded', 'false');
    triggerArrow.classList.remove('up');
    panelSearch.value = '';
  }

  function toggleDropdown() { isOpen ? closeDropdown() : openDropdown(); }

  trigger.addEventListener('click', toggleDropdown);
  trigger.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleDropdown(); } });

  document.addEventListener('click', e => {
    if (!document.getElementById('dropdownWrap').contains(e.target)) closeDropdown();
  });

  // ── SEARCH FILTER ─────────────────────────────────────────
  panelSearch.addEventListener('input', () => {
    const q = panelSearch.value.toLowerCase().replace(/[\s_-]/g, '');
    const filtered = MODELS.filter(m => {
      const l = m.label.toLowerCase().replace(/[\s_-]/g, '');
      const i = m.id.toLowerCase().replace(/[\s_-]/g, '');
      return l.includes(q) || i.includes(q);
    });
    renderOptions(filtered);
  });

  // ── RENDER OPTIONS ────────────────────────────────────────
  function renderOptions(list) {
    optionsEl.innerHTML = '';
    if (list.length === 0) {
      optionsEl.innerHTML = '<div class="no-results">No models found</div>';
      return;
    }
    list.forEach(m => {
      const div = document.createElement('div');
      div.className = 'dropdown-option' + (currentModel && currentModel.id === m.id ? ' is-selected' : '');
      div.setAttribute('role', 'option');
      div.innerHTML = `
        <i data-lucide="refrigerator" style="width:15px;height:15px;flex-shrink:0;color:rgba(255,255,255,0.5);"></i>
        <span style="flex:1;">${m.label}</span>
        <span class="option-tag">${m.series.split(' ')[0]}</span>
        <span class="option-check"><i data-lucide="check" style="width:13px;height:13px;"></i></span>
      `;
      div.addEventListener('click', () => { selectModel(m); closeDropdown(); });
      optionsEl.appendChild(div);
    });
    lucide.createIcons();
  }

  // ── SELECT MODEL ─────────────────────────────────────────
  function selectModel(model) {
    currentModel = model;

    // Update trigger label
    triggerText.textContent = model.label;
    triggerText.className = 'trigger-selected';

    // Chip
    selectedChip.classList.add('visible');
    selectedChipT.textContent = model.label;

    // Diagram label
    diagramLabel.textContent = `— ${model.label}`;

    // Load image with fade
    placeholder.style.display = 'none';
    diagramImg.style.display = 'block';
    diagramImg.classList.remove('fade-in');
    diagramImg.classList.add('fade-out');
    setTimeout(() => {
      diagramImg.src = model.image;
      diagramImg.onload = () => { diagramImg.classList.remove('fade-out'); diagramImg.classList.add('fade-in'); };
      diagramImg.onerror = () => {
        diagramImg.style.display = 'none';
        placeholder.style.display = 'flex';
        placeholder.querySelector('p').textContent = 'Image not found.\nPlace PNG files next to index.html.';
      };
    }, 180);

    currentZoom = 1; applyZoom();
    renderSpecs(model);
    showToast(`${model.label} loaded`);
  }

  // ── SPECS ────────────────────────────────────────────────
  function specCard(spec, highlight) {
    return `<div class="spec-card${highlight?' highlight':''}">
      <div class="spec-card-top">
        <i data-lucide="${spec.icon}" style="width:15px;height:15px;"></i>
        <span class="spec-label">${spec.label}</span>
      </div>
      <div><span class="spec-value">${spec.value}</span><span class="spec-unit"> ${spec.unit}</span></div>
    </div>`;
  }

  function renderSpecs(m) {
    const s = m.specs;
    specsPanel.innerHTML = `
      <div class="model-card animate-in">
        <div class="model-card-eyebrow">Selected Model</div>
        <div class="model-card-name">${m.label}</div>
        <div class="model-card-series"><span>${m.series}</span><span>Direct Cool Refrigerator</span></div>
      </div>
      <div class="spec-section-title animate-in" style="animation-delay:.05s;">
        <i data-lucide="zap" style="width:12px;height:12px;color:var(--singer-red);"></i>
        Electrical Specifications
      </div>
      <div class="spec-grid animate-in" style="animation-delay:.1s;">
        ${specCard(s.voltage)} ${specCard(s.frequency)}
        ${specCard(s.current)} ${specCard(s.motorInput)}
      </div>
      <div class="spec-section-title animate-in" style="animation-delay:.15s;">
        <i data-lucide="box" style="width:12px;height:12px;color:var(--singer-red);"></i>
        Capacity &amp; Physical
      </div>
      <div class="spec-grid animate-in" style="animation-delay:.2s;">
        ${specCard(s.volume)} ${specCard(s.grossVolume)}
        ${specCard(s.netWeight)} ${specCard(s.refrigerant, true)}
      </div>`;
    lucide.createIcons();
  }

  // ── ZOOM ─────────────────────────────────────────────────
  function applyZoom() {
    diagramImg.style.transform = `scale(${currentZoom})`;
    zoomLevelEl.textContent = Math.round(currentZoom * 100) + '%';
  }
  document.getElementById('zoomIn').addEventListener('click',    () => { if(currentZoom<3)   { currentZoom=Math.round((currentZoom+0.25)*100)/100; applyZoom(); }});
  document.getElementById('zoomOut').addEventListener('click',   () => { if(currentZoom>0.5) { currentZoom=Math.round((currentZoom-0.25)*100)/100; applyZoom(); }});
  document.getElementById('zoomReset').addEventListener('click', () => { currentZoom=1; applyZoom(); });
  document.getElementById('diagramContainer').addEventListener('wheel', e => {
    if (diagramImg.style.display==='none') return;
    e.preventDefault();
    if (e.deltaY < 0 && currentZoom < 3)   currentZoom = Math.round((currentZoom+0.1)*100)/100;
    if (e.deltaY > 0 && currentZoom > 0.5) currentZoom = Math.round((currentZoom-0.1)*100)/100;
    applyZoom();
  }, { passive: false });

  // ── TOAST ────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    clearTimeout(toastTimer);
    toastMsg.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ── INIT ─────────────────────────────────────────────────
  lucide.createIcons();
  renderOptions(MODELS);
</script>
</body>
</html>
